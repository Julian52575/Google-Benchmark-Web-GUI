version: "3.9"

services:
  backend:
    build: ./backend
    env_file:
      - .env
      - ./backend/.env
    ports:
      - "8000"
    volumes:
      - ${BENCHMARK_DIR}:${BENCHMARK_DIR}
    command: >
      bash -c "
        uvicorn main:app --host 0.0.0.0 --port 8000
      "

  frontend:
    depends_on:
      - backend
    build: ./frontend
    env_file:
      - .env
      - ./frontend/.env
    ports:
      - "${FRONTEND_PORT}:80"